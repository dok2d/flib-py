<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ book_title | e }} — {{ book_author | e }}</title>
    <style>
        :root {
            --font-size: 18px;
            --line-height: 1.8;
            --bg: #fdf6e3;
            --text: #333333;
            --link: #4361ee;
            --toolbar-bg: rgba(253, 246, 227, 0.95);
            --border: #ddd;
            --dim: #888;
            --max-width: 720px;
        }

        body.night {
            --bg: #1a1a2e;
            --text: #d8d8e8;
            --link: #7b9aff;
            --toolbar-bg: rgba(26, 26, 46, 0.95);
            --border: #333;
            --dim: #aaa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: Georgia, 'Times New Roman', serif;
            font-size: var(--font-size);
            line-height: var(--line-height);
            transition: background 0.3s, color 0.3s;
        }

        /* ── Progress track ─────────────────────────────────────────── */
        .progress-track {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: rgba(128,128,128,0.2);
            z-index: 300;
            cursor: crosshair;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--link);
            pointer-events: none;
            transition: width 0.1s;
        }

        .bm-dot {
            position: absolute;
            top: 0;
            height: 4px;
            width: 10px;
            background: #e74c3c;
            transform: translateX(-50%);
            cursor: pointer;
            border-radius: 0 0 3px 3px;
            z-index: 1;
        }

        .bm-dot::after {
            content: attr(data-label);
            display: none;
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            background: #222;
            color: #fff;
            font-size: 11px;
            font-family: 'Segoe UI', sans-serif;
            padding: 3px 8px;
            border-radius: 4px;
            white-space: nowrap;
            pointer-events: none;
        }

        .bm-dot:hover::after { display: block; }

        /* ── Toolbar ────────────────────────────────────────────────── */
        .toolbar {
            position: sticky;
            top: 0;
            background: var(--toolbar-bg);
            backdrop-filter: blur(6px);
            border-bottom: 1px solid var(--border);
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: nowrap;
            z-index: 200;
        }

        .toolbar a,
        .toolbar button {
            padding: 5px 9px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
            font-family: 'Segoe UI', sans-serif;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .toolbar a:hover,
        .toolbar button:hover,
        .toolbar button.active {
            background: var(--link);
            color: #fff;
            border-color: var(--link);
        }

        .book-info {
            flex: 1;
            min-width: 0;
        }

        .book-title {
            font-weight: bold;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-family: 'Segoe UI', sans-serif;
        }

        .book-author {
            font-size: 11px;
            color: var(--dim);
            font-family: 'Segoe UI', sans-serif;
        }

        .font-controls {
            display: flex;
            align-items: center;
            gap: 2px;
            flex-shrink: 0;
        }

        .font-controls span {
            font-size: 11px;
            min-width: 30px;
            text-align: center;
            font-family: 'Segoe UI', sans-serif;
        }

        /* ── Download dropdown ─────────────────────────────────────── */
        .dl-dropdown { position: relative; flex-shrink: 0; }

        .dl-menu {
            display: none;
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            z-index: 250;
            min-width: 76px;
            overflow: hidden;
        }

        .dl-menu.open { display: block; }

        .dl-menu a {
            display: block;
            padding: 8px 14px;
            color: var(--text);
            text-decoration: none;
            font-family: 'Segoe UI', sans-serif;
            font-size: 13px;
            white-space: nowrap;
            transition: background 0.15s;
        }

        .dl-menu a:hover { background: var(--link); color: #fff; }

        /* ── Sidebar close button ──────────────────────────────────── */
        .sidebar-close {
            position: absolute;
            top: 14px;
            right: 12px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            color: var(--dim);
            font-size: 14px;
            padding: 3px 8px;
            line-height: 1;
            font-family: 'Segoe UI', sans-serif;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }

        .sidebar-close:hover {
            background: rgba(192,57,43,0.1);
            color: #c0392b;
            border-color: #c0392b;
        }

        /* ── TOC sidebar ────────────────────────────────────────────── */
        .toc-sidebar {
            position: fixed;
            top: 0; left: 0;
            width: 280px;
            height: 100vh;
            background: var(--toolbar-bg);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            z-index: 500;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            padding: 52px 0 20px;
        }

        .toc-sidebar.open { transform: translateX(0); }

        .toc-sidebar h3 {
            font-family: 'Segoe UI', sans-serif;
            font-size: 11px;
            font-weight: 600;
            padding: 0 16px 10px;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: 0.07em;
        }

        .toc-sidebar ul { list-style: none; }

        .toc-link {
            display: block;
            padding: 6px 16px;
            font-family: 'Segoe UI', sans-serif;
            font-size: 13px;
            color: var(--text);
            text-decoration: none;
            border-left: 3px solid transparent;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            transition: background 0.15s, border-color 0.15s;
        }

        .toc-link:hover,
        .toc-link.active {
            background: rgba(67, 97, 238, 0.1);
            border-left-color: var(--link);
            color: var(--link);
        }

        .toc-l2 .toc-link { padding-left: 28px; font-size: 12px; }
        .toc-l3 .toc-link { padding-left: 40px; font-size: 12px; color: var(--dim); }

        .toc-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.35);
            z-index: 490;
        }

        .toc-overlay.vis { display: block; }

        /* ── Bookmark panel ─────────────────────────────────────────── */
        .bm-panel {
            position: fixed;
            top: 0; right: 0;
            width: 300px;
            height: 100vh;
            background: var(--toolbar-bg);
            border-left: 1px solid var(--border);
            overflow-y: auto;
            z-index: 500;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            padding: 52px 0 20px;
        }

        .bm-panel.open { transform: translateX(0); }

        .bm-panel h3 {
            font-family: 'Segoe UI', sans-serif;
            font-size: 11px;
            font-weight: 600;
            padding: 0 16px 10px;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: 0.07em;
        }

        .bm-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.35);
            z-index: 490;
        }

        .bm-overlay.vis { display: block; }

        .bm-add-here {
            display: block;
            width: calc(100% - 24px);
            margin: 0 12px 12px;
            padding: 8px 12px;
            border: 1px dashed var(--border);
            border-radius: 6px;
            text-align: center;
            font-family: 'Segoe UI', sans-serif;
            font-size: 13px;
            color: var(--dim);
            cursor: pointer;
            background: transparent;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }

        .bm-add-here:hover {
            background: rgba(67, 97, 238, 0.08);
            color: var(--link);
            border-color: var(--link);
        }

        .bm-list { list-style: none; padding: 0 12px; }

        .bm-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--border);
            margin-bottom: 8px;
            font-family: 'Segoe UI', sans-serif;
            font-size: 13px;
            transition: background 0.15s;
        }

        .bm-pct {
            font-size: 11px;
            background: var(--link);
            color: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .bm-label {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: pointer;
        }

        .bm-del {
            color: #c0392b;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 16px;
            line-height: 1;
            flex-shrink: 0;
            transition: background 0.15s;
        }

        .bm-del:hover { background: rgba(192, 57, 43, 0.15); }

        .bm-empty {
            padding: 16px;
            color: var(--dim);
            font-family: 'Segoe UI', sans-serif;
            font-size: 13px;
            text-align: center;
        }

        /* ── Bookmark popup ─────────────────────────────────────────── */
        .bm-popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            z-index: 600;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
            width: 300px;
            font-family: 'Segoe UI', sans-serif;
        }

        .bm-popup.show { display: block; }

        .bm-popup h4 {
            margin-bottom: 12px;
            font-size: 15px;
            color: var(--text);
        }

        .bm-popup input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            background: var(--bg);
            color: var(--text);
            margin-bottom: 12px;
            font-family: 'Segoe UI', sans-serif;
        }

        .bm-popup-btns {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .bm-popup-btns button {
            padding: 7px 16px;
            border-radius: 6px;
            border: 1px solid var(--border);
            cursor: pointer;
            font-size: 13px;
            font-family: 'Segoe UI', sans-serif;
            background: transparent;
            color: var(--text);
            transition: background 0.15s;
        }

        .bm-popup-btns .btn-save {
            background: var(--link);
            color: #fff;
            border-color: var(--link);
        }

        .popup-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            z-index: 590;
        }

        .popup-overlay.show { display: block; }

        /* ── Content ────────────────────────────────────────────────── */
        .content-wrap { transition: margin-left 0.3s ease; }

        .content {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 40px 20px 100px;
        }

        .content p { margin: 0 0 0.7em; text-indent: 1.5em; }

        .content section { margin-bottom: 2em; }

        .content h2.ch-title,
        .content h3.ch-title,
        .content h4.ch-title {
            text-align: center;
            text-indent: 0;
            margin: 2.5em 0 1em;
        }

        .content h2.ch-title { font-size: 1.35em; }
        .content h3.ch-title { font-size: 1.2em; }
        .content h4.ch-title { font-size: 1.05em; }

        .content h3.subtitle {
            font-size: 1.1em;
            margin: 1.5em 0 0.8em;
            text-align: center;
            text-indent: 0;
        }

        .content blockquote.epigraph,
        .content blockquote.cite {
            border-left: 3px solid var(--border);
            margin: 1.5em 2em;
            padding: 0.5em 1em;
            font-style: italic;
            color: var(--dim);
        }

        .content .poem { margin: 1.5em 2em; }
        .content .stanza { margin-bottom: 1em; }
        .content .v { display: block; }

        .content .text-author {
            text-align: right;
            font-style: italic;
            color: var(--dim);
            margin-top: 0.5em;
        }

        .content code {
            font-family: 'Courier New', monospace;
            background: rgba(128,128,128,0.12);
            padding: 2px 5px;
            border-radius: 3px;
            font-size: 0.9em;
        }

        .content a { color: var(--link); }
        .content em { font-style: italic; }
        .content s  { text-decoration: line-through; }
        .content sup { font-size: 0.75em; vertical-align: super; }
        .content sub { font-size: 0.75em; vertical-align: sub; }

        .content figure.book-img {
            text-align: center;
            margin: 1.5em 0;
        }

        .content figure.book-img img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
        }

        p.error {
            color: #c0392b;
            border: 1px solid #c0392b;
            padding: 12px;
            border-radius: 6px;
        }

        /* ── Print ──────────────────────────────────────────────────── */
        @media print {
            .progress-track,
            .toolbar,
            .toc-sidebar,
            .toc-overlay,
            .bm-panel,
            .bm-overlay,
            .bm-popup,
            .popup-overlay { display: none !important; }

            .content-wrap { margin: 0 !important; }
            .content { padding: 0; max-width: 100%; }
            body { font-size: 11pt; line-height: 1.6; }
        }

        @media (max-width: 600px) {
            .content { padding: 20px 14px 80px; }
            .toolbar { padding: 5px 8px; gap: 3px; }
            .toc-sidebar { width: 85vw; }
            .bm-panel { width: 90vw; }
            #fsLabel { display: none; }
        }
    </style>
</head>
<body>
    <!-- Progress track (seek bar + bookmark dots) -->
    <div class="progress-track" id="progressTrack">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <!-- TOC overlay (tap-to-close) -->
    <div class="toc-overlay" id="tocOverlay" onclick="closeToc()"></div>

    <!-- Bookmark panel overlay (tap-to-close) -->
    <div class="bm-overlay" id="bmOverlay" onclick="closeBmPanel()"></div>

    <!-- TOC sidebar -->
    <aside class="toc-sidebar" id="tocSidebar">
        <button class="sidebar-close" onclick="closeToc()" title="Close">✕</button>
        <h3>Contents</h3>
        <ul id="tocList"></ul>
    </aside>

    <!-- Toolbar -->
    <div class="toolbar">
        <a href="/">←</a>

        <div class="dl-dropdown" id="dlDropdown">
            <button onclick="toggleDlMenu(event)" title="Download">⬇</button>
            <div class="dl-menu" id="dlMenu">
                <a href="{{ download_link | e }}">FB2</a>
                {% if convert_base %}
                <a href="{{ convert_base | e }}/to/txt">TXT</a>
                <a href="{{ convert_base | e }}/to/epub">EPUB</a>
                <a href="{{ convert_base | e }}/to/pdf">PDF</a>
                {% endif %}
            </div>
        </div>

        <div class="book-info">
            <div class="book-title">{{ book_title | e }}</div>
            <div class="book-author">{{ book_author | e }}</div>
        </div>

        <div class="font-controls">
            <button onclick="changeFontSize(-2)" title="Decrease font size">−</button>
            <span id="fsLabel"></span>
            <button onclick="changeFontSize(2)" title="Increase font size">+</button>
        </div>

        <button onclick="toggleNight()" id="nightBtn"></button>
        {% if toc %}
        <button onclick="toggleToc()" id="tocBtn" title="Table of contents">☰</button>
        {% endif %}
        <button onclick="toggleBmPanel()" id="bmBtn" title="Bookmarks">🔖</button>
    </div>

    <!-- Content -->
    <div class="content-wrap" id="contentWrap">
        <div class="content">
            {{ content | safe }}
        </div>
    </div>

    <!-- Bookmark panel -->
    <aside class="bm-panel" id="bmPanel">
        <button class="sidebar-close" onclick="closeBmPanel()" title="Close">✕</button>
        <h3>Bookmarks</h3>
        <button class="bm-add-here" onclick="addBmHere()">+ Add bookmark here</button>
        <ul class="bm-list" id="bmList"></ul>
    </aside>

    <!-- Bookmark popup (label input) -->
    <div class="popup-overlay" id="popupOverlay" onclick="cancelBm()"></div>
    <div class="bm-popup" id="bmPopup">
        <h4>Add Bookmark</h4>
        <input type="text" id="bmLabel" placeholder="Label (optional)" maxlength="80">
        <div class="bm-popup-btns">
            <button onclick="cancelBm()">Cancel</button>
            <button class="btn-save" onclick="confirmBm()">Save</button>
        </div>
    </div>

    <script>
    // ── Utilities ──────────────────────────────────────────────────────────
    function escHtml(s) {
        const d = document.createElement('div');
        d.textContent = s == null ? '' : String(s);
        return d.innerHTML;
    }

    function getScrollPct() {
        const total = document.documentElement.scrollHeight - window.innerHeight;
        return total > 0 ? Math.round(window.scrollY / total * 1000) / 10 : 0;
    }

    // ── Settings ───────────────────────────────────────────────────────────
    let fontSize = parseInt(localStorage.getItem('readerFontSize') || '18');
    let isNight  = localStorage.getItem('readerNight') === '1';

    function applySettings() {
        document.documentElement.style.setProperty('--font-size', fontSize + 'px');
        document.getElementById('fsLabel').textContent = fontSize + 'px';
        document.body.classList.toggle('night', isNight);
        const btn = document.getElementById('nightBtn');
        btn.textContent = isNight ? '☀' : '🌙';
        btn.title = isNight ? 'Day mode' : 'Night mode';
    }

    function changeFontSize(d) {
        fontSize = Math.min(32, Math.max(12, fontSize + d));
        localStorage.setItem('readerFontSize', fontSize);
        applySettings();
    }

    function toggleNight() {
        isNight = !isNight;
        localStorage.setItem('readerNight', isNight ? '1' : '0');
        applySettings();
    }

    // ── Progress ───────────────────────────────────────────────────────────
    window.addEventListener('scroll', () => {
        document.getElementById('progressFill').style.width = getScrollPct() + '%';
        updateTocHighlight();
    }, { passive: true });

    document.getElementById('progressTrack').addEventListener('click', (e) => {
        if (e.target.classList.contains('bm-dot')) return;
        const pct = e.clientX / window.innerWidth * 100;
        const total = document.documentElement.scrollHeight - window.innerHeight;
        window.scrollTo({ top: pct / 100 * total, behavior: 'instant' });
    });

    // ── Download dropdown ──────────────────────────────────────────────────
    function toggleDlMenu(e) {
        e.stopPropagation();
        document.getElementById('dlMenu').classList.toggle('open');
    }

    document.addEventListener('click', () => {
        document.getElementById('dlMenu').classList.remove('open');
    });

    // ── TOC ────────────────────────────────────────────────────────────────
    const tocData = {{ toc | tojson }};
    const bookId  = {{ book_id | tojson }};

    (function buildToc() {
        const ul = document.getElementById('tocList');
        if (!ul || !tocData.length) return;
        tocData.forEach(e => {
            const li = document.createElement('li');
            const lvl = Math.min(e.level, 3);
            if (lvl >= 2) li.className = 'toc-l' + lvl;
            const a = document.createElement('a');
            a.className = 'toc-link';
            a.href = '#' + e.id;
            a.textContent = e.title;
            a.addEventListener('click', ev => {
                ev.preventDefault();
                const el = document.getElementById(e.id);
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                closeToc();
            });
            li.appendChild(a);
            ul.appendChild(li);
        });
    })();

    function updateTocHighlight() {
        if (!tocData.length) return;
        const mid = window.scrollY + window.innerHeight * 0.35;
        let activeId = null;
        for (const e of tocData) {
            const el = document.getElementById(e.id);
            if (el && el.getBoundingClientRect().top + window.scrollY <= mid) {
                activeId = e.id;
            }
        }
        document.querySelectorAll('.toc-link').forEach(a => {
            a.classList.toggle('active', a.getAttribute('href') === '#' + activeId);
        });
    }

    let tocOpen = false;

    function toggleToc() {
        if (!tocOpen) closeBmPanel();
        tocOpen = !tocOpen;
        document.getElementById('tocSidebar').classList.toggle('open', tocOpen);
        document.getElementById('tocOverlay').classList.toggle('vis', tocOpen);
        const btn = document.getElementById('tocBtn');
        if (btn) btn.classList.toggle('active', tocOpen);
    }

    function closeToc() {
        tocOpen = false;
        document.getElementById('tocSidebar').classList.remove('open');
        document.getElementById('tocOverlay').classList.remove('vis');
        const btn = document.getElementById('tocBtn');
        if (btn) btn.classList.remove('active');
    }

    // ── Bookmarks ──────────────────────────────────────────────────────────
    const BM_KEY = 'rdr_bm_' + bookId;

    function loadBmList() {
        try { return JSON.parse(localStorage.getItem(BM_KEY) || '[]'); }
        catch { return []; }
    }

    function saveBmData(list) {
        localStorage.setItem(BM_KEY, JSON.stringify(list));
    }

    let pendingPct = null;

    function addBmHere() {
        showBmPopup(getScrollPct());
    }

    function showBmPopup(pct) {
        pendingPct = pct;
        document.getElementById('bmLabel').value = '';
        document.getElementById('bmPopup').classList.add('show');
        document.getElementById('popupOverlay').classList.add('show');
        setTimeout(() => document.getElementById('bmLabel').focus(), 60);
    }

    function confirmBm() {
        if (pendingPct === null) return;
        const label = document.getElementById('bmLabel').value.trim() || (pendingPct + '%');
        const list = loadBmList();
        list.push({ pct: pendingPct, label, ts: Date.now() });
        list.sort((a, b) => a.pct - b.pct);
        saveBmData(list);
        cancelBm();
        renderBm();
    }

    function cancelBm() {
        pendingPct = null;
        document.getElementById('bmPopup').classList.remove('show');
        document.getElementById('popupOverlay').classList.remove('show');
    }

    document.getElementById('bmLabel').addEventListener('keydown', e => {
        if (e.key === 'Enter')  confirmBm();
        if (e.key === 'Escape') cancelBm();
    });

    function deleteBm(idx) {
        const list = loadBmList();
        list.splice(idx, 1);
        saveBmData(list);
        renderBm();
    }

    function scrollToBm(pct) {
        const total = document.documentElement.scrollHeight - window.innerHeight;
        window.scrollTo({ top: pct / 100 * total, behavior: 'smooth' });
    }

    function renderBm() {
        const list = loadBmList();

        // Dots on progress track
        document.querySelectorAll('.bm-dot').forEach(d => d.remove());
        const track = document.getElementById('progressTrack');
        list.forEach(bm => {
            const dot = document.createElement('div');
            dot.className = 'bm-dot';
            dot.style.left = bm.pct + '%';
            dot.setAttribute('data-label', bm.label);
            dot.title = bm.label;
            dot.addEventListener('click', ev => {
                ev.stopPropagation();
                scrollToBm(bm.pct);
            });
            track.appendChild(dot);
        });

        // Panel list
        const ul = document.getElementById('bmList');
        if (!list.length) {
            ul.innerHTML = '<li class="bm-empty">No bookmarks yet.<br>Click "Add bookmark here" to save<br>your current reading position.</li>';
            return;
        }
        ul.innerHTML = '';
        list.forEach((bm, idx) => {
            const li = document.createElement('li');
            const item = document.createElement('div');
            item.className = 'bm-item';
            item.innerHTML =
                `<span class="bm-pct">${escHtml(String(bm.pct))}%</span>` +
                `<span class="bm-label" title="${escHtml(bm.label)}">${escHtml(bm.label)}</span>` +
                `<span class="bm-del" title="Delete">&times;</span>`;
            item.querySelector('.bm-pct').addEventListener('click', () => scrollToBm(bm.pct));
            item.querySelector('.bm-label').addEventListener('click', () => scrollToBm(bm.pct));
            item.querySelector('.bm-del').addEventListener('click', e => {
                e.stopPropagation();
                deleteBm(idx);
            });
            li.appendChild(item);
            ul.appendChild(li);
        });
    }

    let bmPanelOpen = false;

    function toggleBmPanel() {
        if (!bmPanelOpen) closeToc();
        bmPanelOpen = !bmPanelOpen;
        document.getElementById('bmPanel').classList.toggle('open', bmPanelOpen);
        document.getElementById('bmBtn').classList.toggle('active', bmPanelOpen);
        document.getElementById('bmOverlay').classList.toggle('vis', bmPanelOpen);
    }

    function closeBmPanel() {
        bmPanelOpen = false;
        document.getElementById('bmPanel').classList.remove('open');
        document.getElementById('bmBtn').classList.remove('active');
        document.getElementById('bmOverlay').classList.remove('vis');
    }

    // ── Keyboard navigation ────────────────────────────────────────────────
    // ↑/↓ — обычная прокрутка браузера (фокус на body обеспечен ниже)
    // →/PageDown — на экран вниз (мгновенно)
    // ←/PageUp  — на экран вверх (мгновенно)
    document.addEventListener('keydown', e => {
        const tag = document.activeElement.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA') return;
        if (e.key === 'ArrowRight' || e.key === 'PageDown') {
            e.preventDefault();
            window.scrollBy({ top: window.innerHeight * 0.9, behavior: 'instant' });
        } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
            e.preventDefault();
            window.scrollBy({ top: -window.innerHeight * 0.9, behavior: 'instant' });
        }
    });

    // ── Mobile tap zones ───────────────────────────────────────────────────
    // Два невидимых блока: левый (0–10% ширины) и правый (90–100% ширины),
    // каждый на всю высоту экрана. Не перекрывают выдвинутые сайдбары.
    // Верхние 70% блока → экран вниз; нижние 30% → экран вверх.
    let _tx = null, _ty = null, _tt = null;

    document.addEventListener('touchstart', e => {
        _tx = e.touches[0].clientX;
        _ty = e.touches[0].clientY;
        _tt = Date.now();
    }, { passive: true });

    document.addEventListener('touchend', e => {
        if (_tx === null) return;
        const ex = e.changedTouches[0].clientX;
        const ey = e.changedTouches[0].clientY;
        const dx = Math.abs(ex - _tx);
        const dy = Math.abs(ey - _ty);
        const dt = Date.now() - _tt;
        _tx = _ty = _tt = null;

        // Только быстрый тап без движения
        if (dx > 10 || dy > 10 || dt > 350) return;

        // Сайдбары открыты — тапы их оверлеи перехватят сами
        if (tocOpen || bmPanelOpen) return;

        // Не перехватываем тапы по кнопкам/ссылкам/тулбару
        if (e.target.closest('a, button, input, .toolbar, .progress-track')) return;

        const w = window.innerWidth;
        const h = window.innerHeight;

        // Зоны: левые 10% и правые 10% ширины экрана
        if (ex < w * 0.10 || ex > w * 0.90) {
            if (ey < h * 0.70) {
                // Верхние 70% зоны → вперёд (вниз)
                window.scrollBy({ top: window.innerHeight * 0.9, behavior: 'instant' });
            } else {
                // Нижние 30% зоны → назад (вверх)
                window.scrollBy({ top: -window.innerHeight * 0.9, behavior: 'instant' });
            }
        }
    }, { passive: true });

    // ── Init ───────────────────────────────────────────────────────────────
    applySettings();
    renderBm();
    // Фокус на body, чтобы стрелки сразу работали без клика
    document.body.tabIndex = -1;
    document.body.focus();
    </script>
</body>
</html>
