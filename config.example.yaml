# Telegram bot token — get it from @BotFather
token: "1234567890:ABCdefGHIjklMNOpqrsTUVwxyz"

# Whitelist of Telegram user IDs that the bot will respond to.
# The bot will completely ignore ALL messages from anyone not listed here —
# no reply, no acknowledgment.
# To find your Telegram ID, message @userinfobot.
allowed_users:
  - 123456789    # your Telegram user ID
  # - 987654321  # another allowed user

# Path to the SQLite database file generated by inpx2sql.py
database_path: "/path/to/books.db"

# Path to the directory that contains the book archive ZIP files
archives_path: "/path/to/archives"

# Maximum number of search results returned per query (default: 5)
max_results: 5
